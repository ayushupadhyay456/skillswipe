##############################################################################
# docker-compose.yml  –  SkillSwap
#
# Services
# ────────
#   web      – Flask + SocketIO (gunicorn + eventlet)  → http://localhost:5000
#   nginx    – Reverse proxy + static files            → http://localhost:80
#   redis    – Cache + pub/sub + sessions
#   postgres – Primary relational database
#
# Run (production):
#   docker compose up --build
#
# Run (dev with live reload):
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# First run creates all tables and seeds sample data automatically.
##############################################################################

services:

  # ── Flask application ─────────────────────────────────────────────────────
  web:
    build: .
    # Production: gunicorn + eventlet (1 worker required for SocketIO)
    command: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:5000 --timeout 120 --access-logfile - --error-logfile - app:app
    expose:
      - "5000"
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://skillswap:skillswap@postgres:5432/skillswap
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./static:/app/static          # serve static from nginx
      - ./templates:/app/templates     # hot-reload templates in dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static:ro        # static files served directly by nginx
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skillswap
      POSTGRES_PASSWORD: skillswap
      POSTGRES_DB: skillswap
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillswap -d skillswap"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
