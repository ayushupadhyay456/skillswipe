##############################################################################
# nginx/nginx.conf  –  SkillSwap
#
# Handles:
#   • HTTP → Flask proxy
#   • WebSocket upgrade (Socket.IO)
#   • Static files served directly by Nginx (no Flask overhead)
#   • Gzip compression
##############################################################################

upstream skillswap_app {
    server web:5000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 16M;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # ── Static files (served directly — bypasses Flask) ──────────────────────
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Socket.IO WebSocket upgrade ───────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://skillswap_app/socket.io/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;   # keep WebSocket connections alive
        proxy_send_timeout 86400s;
    }

    # ── All other requests → Flask ────────────────────────────────────────────
    location / {
        proxy_pass http://skillswap_app;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
